<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UsTogether — Our Shared Memories</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,600;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-content">
      <div class="heart-pulse">💖</div>
      <h1 class="brand-title">UsTogether</h1>
      <p class="brand-sub">Abhay & Dhakshitha</p>
    </div>
  </div>

  <!-- Navigation Header -->
  <nav class="top-nav">
    <div class="nav-brand">UsTogether</div>
    <button class="hamburger-btn" onclick="toggleMenu()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Menu Drawer -->
  <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
  <div id="menuDrawer" class="menu-drawer">
    <div class="drawer-header">
      <h3>Options</h3>
      <button class="close-drawer" onclick="toggleMenu()">✕</button>
    </div>
    <ul class="drawer-items">
      <li onclick="openStoriesSheet()">
        <span class="drawer-icon">📖</span>
        <span>Stories</span>
      </li>
      <li onclick="toggleDeleteMode()">
        <span class="drawer-icon">🗑️</span>
        <span id="deleteModeText">Delete a Memory</span>
      </li>
    </ul>
  </div>

  <!-- Main App Container -->
  <div class="app-container">
    <header class="app-header">
      <div class="profile-badge glowing-badge">
        <span class="sparkle">✨</span>
        <h2>Abhay & Dhakshitha</h2>
      </div>
      <p class="subtitle">Our Personal Diary & Memories</p>
    </header>

    <!-- Create Memory Card -->
    <section class="card input-card glowing-card">
      <div class="author-selector">
        <label>Writing as:</label>
        <select id="authorSelect" onchange="saveAuthorPreference()">
          <option value="" disabled selected>Select your name...</option>
          <option value="Abhay">Abhay 👦🏻</option>
          <option value="Dhakshitha">Dhakshitha 👧🏻</option>
        </select>
      </div>

      <textarea id="diaryInput" placeholder="What made you smile today? Write a memory..."></textarea>
      
      <div class="mood-picker">
        <span class="mood-label">Mood:</span>
        <div class="mood-options">
          <button class="mood-btn active" data-mood="🥰">🥰</button>
          <button class="mood-btn" data-mood="🥺">🥺</button>
          <button class="mood-btn" data-mood="✨">✨</button>
          <button class="mood-btn" data-mood="❤️">❤️</button>
          <button class="mood-btn" data-mood="🌙">🌙</button>
        </div>
      </div>

      <button id="saveBtn" onclick="saveEntry()">Post Memory ✨</button>
    </section>

    <!-- Timeline Section -->
    <section class="feed-section">
      <div class="timeline-header">
        <h3>Memory Timeline</h3>
        <span class="memory-count" id="entryCount">✨</span>
      </div>
      <div id="deleteBanner" class="delete-banner" style="display: none;">
        <span>Tap any memory below to delete it</span>
        <button onclick="toggleDeleteMode()">Cancel</button>
      </div>
      <div id="entriesFeed" class="timeline-feed">
        <div class="loading">Loading memories...</div>
      </div>
    </section>
  </div>

  <!-- Bottom Sheet Overlay for Stories Interface -->
  <div id="storyModalOverlay" class="story-modal-overlay" onclick="closeStoriesSheet()"></div>
  <div id="storyBottomSheet" class="story-bottom-sheet">
    <div class="sheet-handle-bar"></div>
    
    <div class="story-sheet-header">
      <h2>Stories Vault 🥀</h2>
      <button class="close-sheet-btn" onclick="closeStoriesSheet()">✕</button>
    </div>

    <div class="story-sheet-content">
      <!-- Write Story Box -->
      <div class="story-input-box glowing-card">
        <input type="text" id="storyTitle" class="story-title-input" placeholder="Title / Chapter..." />
        <textarea id="storyContent" class="story-text-area" placeholder="Write your chapter here..."></textarea>
        <button class="story-publish-btn" onclick="saveStory()">Publish Chapter 🍷</button>
      </div>

      <!-- Published Stories List -->
      <div class="stories-feed-header">
        <h3>Published Chapters</h3>
      </div>
      <div id="storiesFeed" class="stories-feed-container">
        <!-- Stories load dynamically here -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
